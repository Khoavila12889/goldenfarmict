services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: goldenfarm-backend
    ports:
      - "8000:8000"
    volumes:
      # Backend code for hot-reload (docker compose restart backend)
      - ./backend/app:/app/app:rw
      - ./backend/main.py:/app/main.py:rw
      # Mount SQLite database directory for data persistence
      - ./backend/data:/app/data:rw
      # Mount logs directory
      - ./backend/logs:/app/logs:rw
      # Mount luong.docx template (read-only)
      - ./frontend/src/template:/app/templates:ro
    environment:
      - APP_ENV=production
      - PYTHONUNBUFFERED=1
      - DB_DIR=/app/data
      - CORS_ORIGINS=http://localhost:5173,http://127.0.0.1:5173,http://localhost:8088
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - goldenfarm-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: goldenfarm-frontend
    ports:
      - "8088:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - goldenfarm-network

networks:
  goldenfarm-network:
    driver: bridge

volumes:
  backend-data:
    driver: local